<!DOCTYPE html>
<html>

<head>
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home">

    <h1>💻 Portfolio</h1>

    <button onclick="showPage('about')">
        👤 O mnie
    </button>

    <button onclick="showPage('skills')">
        🧠 Umiejętności
    </button>

    <button onclick="showPage('projects')">
        ⚙️ Projekty
    </button>

    <button onclick="showPage('contact')">
        📩 Kontakt
    </button>

</div>







        🐍 Python<br>
        🌐 HTML & CSS<br>
        🐙 GitHub<br>
        ⚙️ Tworzenie projektów
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>



        🌐 Strony WWW<br>
        🐍 Python<br>
        🔧 Eksperymenty technologiczne
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>






<script>

function showPage(page){

    document.getElementById("home").style.display = "none";

    document.querySelectorAll(".page").forEach(function(section){
        section.style.display = "none";
    });

    document.getElementById(page).style.display = "block";

}


function goHome(){

    document.querySelectorAll(".page").forEach(function(section){
        section.style.display = "none";
    });

    document.getElementById("home").style.display = "block";

}

</script>


</body>

</html>
