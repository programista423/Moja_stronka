<!DOCTYPE html>
<html>

<head>
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home">

    <h1>💻 Portfolio</h1>

    <button onclick="showPage('about')">
        👤 O mnie
    </button>

    <button onclick="showPage('skills')">
        🧠 Umiejętności
    </button>

    <button onclick="showPage('projects')">
        ⚙️ Projekty
    </button>

    <button onclick="showPage('contact')">
        📩 Kontakt
    </button>

</div>


<div id="about" class="page">

    <h1>👤 O mnie</h1>

    <p>
        Początkujący programista,
        który tworzy projekty i uczy się nowych technologii.
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>



<div id="skills" class="page">

    <h1>🧠 Umiejętności</h1>

    <p>
        🐍 Python<br>
        🌐 HTML & CSS<br>
        🐙 GitHub<br>
        ⚙️ Tworzenie projektów
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>



<div id="projects" class="page">

    <h1>⚙️ Projekty</h1>

    <p>
        🌐 Strony WWW<br>
        🐍 Python<br>
        🔧 Eksperymenty technologiczne
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>



<div id="contact" class="page">

    <h1>📩 Kontakt</h1>

    <p>
        GitHub: programista423
    </p>

    <button onclick="goHome()">⬅ Powrót</button>

</div>



<script>

function showPage(page){

    document.getElementById("home").style.display = "none";

    document.querySelectorAll(".page").forEach(function(section){
        section.style.display = "none";
    });

    document.getElementById(page).style.display = "block";

}


function goHome(){

    document.querySelectorAll(".page").forEach(function(section){
        section.style.display = "none";
    });

    document.getElementById("home").style.display = "block";

}

</script>


</body>

</html>
